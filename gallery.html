<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batch Gallery</title>

<style>

body{
background:#ffffff;
margin:0;
min-height:100vh;
font-family:'Inter',sans-serif;
display:flex;
flex-direction:column;
padding-bottom:60px;
}

/* WATERMARK */

body::before{
content:"";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:260px;
background-image:url("images/logo.png");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
opacity:0.08;
pointer-events:none;
z-index:-1;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
background:#000;
padding:12px 16px;
}

.logo{
height:35px;
}

.batch-title{
color:white;
font-size:20px;
font-weight:600;
text-align:center;
flex:1;
}

/* IMAGE GRID */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:15px;
}

.gallery img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* VIDEO GRID */

.videos{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.videos iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:6px;
}

@media(max-width:700px){

.videos{
grid-template-columns:1fr;
}

}

/* VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.viewer img{
max-width:90%;
max-height:80%;
}

/* CLOSE BUTTON */

.close-btn{
position:fixed;
top:20px;
right:20px;
width:45px;
height:45px;
border-radius:50%;
background:rgba(0,0,0,0.6);
color:#fff;
font-size:28px;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

/* NAV BUTTONS */

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
width:50px;
height:50px;
border-radius:50%;
font-size:25px;
cursor:pointer;
}

.nav.left{ left:20px; }
.nav.right{ right:20px; }

/* DOWNLOAD */

.download{
position:absolute;
bottom:30px;
background:white;
color:black;
padding:12px 35px;
border-radius:30px;
font-weight:bold;
text-decoration:none;
}

/* FOOTER */

.footerTabs{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#000;
padding:10px 0;
}

.footerTabs button{
background:none;
border:none;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<img src="images/logo.png" class="logo">

<div class="batch-title" id="batchTitle">
Loading...
</div>

</header>

<!-- IMAGES -->

<div id="imagesSection">
<div class="gallery" id="gallery"></div>
</div>

<!-- VIDEOS -->

<div id="videosSection" style="display:none">
<div class="videos" id="videoContainer"></div>
</div>

<!-- IMAGE VIEWER -->

<div class="viewer" id="viewer">

<button class="close-btn" onclick="closeViewer()">X</button>

<button class="nav left" onclick="prevImage()">⬅</button>

<img id="viewerImg">

<button class="nav right" onclick="nextImage()">➡</button>

<a id="downloadBtn" class="download" download>Download</a>

</div>

<!-- FOOTER -->

<div class="footerTabs">

<button onclick="showImages()">Images</button>
<button onclick="showVideos()">Videos</button>

</div>

<script>

/* SECURITY */

const batchCode = sessionStorage.getItem("batchCode");

if(!batchCode){

document.body.innerHTML =
"<h2 style='text-align:center;margin-top:100px;'>Access Denied</h2>";

throw new Error("No session");

}

let batchData;

let images=[];
let loadedImages=0;
let currentIndex=0;

const loadStep=36;

/* LOAD BATCH DATA */

fetch("batches.json")
.then(res=>res.json())
.then(data=>{

if(!data[batchCode]){

document.getElementById("batchTitle").innerText="Batch Not Found";
return;

}

batchData=data[batchCode];

document.getElementById("batchTitle").innerText=batchData.name;

loadImages();
loadVideos();

});

/* LOAD CLOUDINARY IMAGES */

async function loadImages(){

const cloud=batchData.cloud;
const folder=batchData.folder;

const url=`https://res.cloudinary.com/${cloud}/image/list/${folder}.json`;

const data=await fetch(url).then(r=>r.json());

data.resources.forEach(img=>{

let src=`https://res.cloudinary.com/${cloud}/image/upload/${img.public_id}.jpg`;

images.push(src);

});

loadMoreImages();

}

/* LOAD IMAGES IN STEPS */

function loadMoreImages(){

const gallery=document.getElementById("gallery");

for(let i=0;i<loadStep;i++){

if(loadedImages>=images.length) return;

let img=document.createElement("img");

img.src=images[loadedImages];
img.loading="lazy";

let index=loadedImages;

img.onclick=function(){

openViewer(index);

};

gallery.appendChild(img);

loadedImages++;

}

}

/* SCROLL LOAD */

window.addEventListener("scroll",function(){

if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){

loadMoreImages();

}

});

/* VIEWER */

function openViewer(index){

currentIndex=index;

document.getElementById("viewer").style.display="flex";

updateViewer();

}

function updateViewer(){

let src=images[currentIndex];

document.getElementById("viewerImg").src=src;

document.getElementById("downloadBtn").href=src;

}

function closeViewer(){

document.getElementById("viewer").style.display="none";

}

/* IMAGE NAVIGATION */

function nextImage(){

if(currentIndex < images.length-1){

currentIndex++;
updateViewer();

}

}

function prevImage(){

if(currentIndex>0){

currentIndex--;
updateViewer();

}

}

/* LOAD VIDEOS */

function loadVideos(){

const container=document.getElementById("videoContainer");

batchData.videos.forEach(id=>{

let iframe=document.createElement("iframe");

iframe.src="https://www.youtube.com/embed/"+id;

iframe.allowFullscreen=true;

container.appendChild(iframe);

});

}

/* SWITCH SECTIONS */

function showImages(){

document.getElementById("imagesSection").style.display="block";
document.getElementById("videosSection").style.display="none";

}

function showVideos(){

document.getElementById("imagesSection").style.display="none";
document.getElementById("videosSection").style.display="block";

}

/* SWIPE BETWEEN SECTIONS */

let startX=0;

document.addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});

document.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].screenX;

if(endX < startX - 50) showVideos();

if(endX > startX + 50) showImages();

});

/* SWIPE IMAGE VIEWER */

document.getElementById("viewer")
.addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});

document.getElementById("viewer")
.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].screenX;

if(endX < startX - 50) nextImage();

if(endX > startX + 50) prevImage();

});

</script>

</body>
</html>
