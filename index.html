<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Last Click</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    min-height:100vh;
    color:#F8F9FA;
    display:flex;
    flex-direction:column;
    background-color:#2C3E50;
    position:relative;
}

/* Academic Pattern Background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='10' y='10' width='30' height='40' rx='4'/%3E%3Ccircle cx='80' cy='30' r='15'/%3E%3Cpolygon points='60,80 75,100 45,100'/%3E%3Crect x='85' y='70' width='25' height='35' rx='3'/%3E%3C/g%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:140px 140px;
    pointer-events:none;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    background:#2D6A4F;
}

/* Brand Section */
.brand-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#F8F9FA;
}

/* Logo Image */
.brand-logo{
    height:38px;
    width:auto;
    object-fit:contain;
}

/* Brand Name */
.brand-name{
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
}

/* Contact Button */
.contact{
    font-size:14px;
    color:#F8F9FA;
    text-decoration:none;
    border:1px solid #F8F9FA;
    padding:6px 14px;
    border-radius:20px;
    transition:0.3s;
}

.contact:hover{
    background:#F8F9FA;
    color:#1B4332;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
}

/* UNIVERSAL IMAGE FRAME */
.image-box{
    width:90%;
    max-width:400px;
    aspect-ratio: 3 / 4;
    background:#000000;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(5,0,0,0.5);
}

/* IMAGE AUTO FIT */
.image-box img{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#FAF9F6;
}

/* Batch Name */
.batch-name{
    margin-top:20px;
    font-size:18px;
    letter-spacing:1px;
}

/* BUTTON */
.memories-btn{
    margin-top:30px;
    padding:12px 45px;
    border:none;
    border-radius:30px;
    background:#F8F9FA;
    color:#1B4332;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.memories-btn:hover{
    background:#d8f3dc;
    transform:translateY(-3px);
}

/* FOOTER */
footer{
    text-align:center;
    padding:18px;
    background:#2D6A4F;
    font-size:13px;
}

.social-links a{
    margin:0 10px;
    color:#F8F9FA;
    text-decoration:none;
    opacity:0.8;
}

.social-links a:hover{
    opacity:1;
}

/* MOBILE */
@media(max-width:600px){
    .image-box{
        max-width:320px;
    }
}
</style>
</head>

<body>

<header>
    <!-- Brand clickable -->
    <a href="#" class="brand-wrapper">
        <img src="images/logo.png" class="brand-logo" alt="OLC">
        <div class="brand-name">One Last Click</div>
    </a>

    <a href="mailto:example@gmail.com" class="contact">Contact Us</a>
</header>

<div class="main">

    <div class="image-box">
        <img id="batchImage" src="" alt="Portrait">
    </div>

    <div class="batch-name" id="batchName"></div>

    <button class="memories-btn" onclick="openMemories()">
        Explore Memories
    </button>

</div>

<footer>
    <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">Whatsapp</a>
        <a href="#">Website</a>
    </div>
</footer>

<script>
let driveLink = "";

const params = new URLSearchParams(window.location.search);
const batchCode = params.get("code");

if(batchCode){
    fetch("batches.json")
    .then(response => response.json())
    .then(data => {
        if(data[batchCode]){
            document.getElementById("batchImage").src = "images/" + data[batchCode].image;
            document.getElementById("batchName").innerText = data[batchCode].name;
            driveLink = data[batchCode].drive;
        } else {
            document.getElementById("batchName").innerText = "Invalid Code";
        }
    });
} else {
    document.getElementById("batchName").innerText = "Batch Code Missing";
}

function openMemories(){
    if(driveLink){
        window.open(driveLink, "_blank");
    }
}
</script>

</body>
</html>
