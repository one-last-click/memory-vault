<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Last Click</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    min-height:100vh;
    color:#F8F9FA;
    display:flex;
    flex-direction:column;
    background-color:#2C3E50;
    position:relative;
}

/* PASSWORD SCREEN */

#passwordGate{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.password-box{
    background:#fff;
    color:#000;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

.password-box input{
    padding:10px;
    margin-top:10px;
    width:200px;
}

.password-box button{
    margin-top:10px;
    padding:10px 20px;
    cursor:pointer;
}
    .password-wrapper{
position:relative;
display:inline-block;
}

.password-wrapper input{
padding:10px;
padding-right:40px;
width:220px;
}

.eye-icon{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* Academic Pattern Background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='10' y='10' width='30' height='40' rx='4'/%3E%3Ccircle cx='80' cy='30' r='15'/%3E%3Cpolygon points='60,80 75,100 45,100'/%3E%3Crect x='85' y='70' width='25' height='35' rx='3'/%3E%3C/g%3E%3C/svg%3E");
    background-repeat:repeat;
    background-size:140px 140px;
    pointer-events:none;
}

/* HEADER */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    background:#2D6A4F;
}

.brand-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#F8F9FA;
}

.brand-logo{
    height:38px;
    width:auto;
    object-fit:contain;
}

.brand-name{
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
}

.contact{
    font-size:14px;
    color:#F8F9FA;
    text-decoration:none;
    border:1px solid #F8F9FA;
    padding:6px 14px;
    border-radius:20px;
    transition:0.3s;
}

.contact:hover{
    background:#F8F9FA;
    color:#1B4332;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
}

.image-box{
    width:95%;
    max-width:900px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(5,0,0,0.5);
}

.image-box img{
    width:100%;
    height:auto;
    object-fit:contain;
}

.batch-name{
    margin-top:20px;
    font-size:18px;
    letter-spacing:1px;
}

.memories-btn{
    margin-top:30px;
    padding:12px 45px;
    border:none;
    border-radius:30px;
    background:#F8F9FA;
    color:#1B4332;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.memories-btn:hover{
    background:#d8f3dc;
    transform:translateY(-3px);
}

/* FOOTER */

footer{
    text-align:center;
    padding:18px;
    background:#2D6A4F;
    font-size:13px;
}

.social-links a{
    margin:0 10px;
    color:#F8F9FA;
    text-decoration:none;
    opacity:0.8;
}

.social-links a:hover{
    opacity:1;
}

@media(max-width:600px){
    .image-box{
        max-width:320px;
    }
}

</style>
</head>

<body>

<!-- PASSWORD POPUP -->

<div id="passwordGate">
<div class="password-box">
<h2>Enter Batch Password</h2>
<div class="password-wrapper">

<input
type="password"
id="batchPassword"
placeholder="Password">

<span class="eye-icon" onclick="togglePassword()">

<svg width="22" height="22" viewBox="0 0 24 24" fill="none">
<path d="M12 5C6.5 5 2 9.5 2 12C2 14.5 6.5 19 12 19C17.5 19 22 14.5 22 12C22 9.5 17.5 5 12 5Z" stroke="black" stroke-width="2"/>
<circle cx="12" cy="12" r="3" stroke="black" stroke-width="2"/>
</svg>

</span>
</div>
<button onclick="unlock()">Enter</button>
</div>
</div>

<header>

<a href="#" class="brand-wrapper">
<img src="images/logo.png" class="brand-logo" alt="OLC">
<div class="brand-name">One Last Click</div>
</a>

<a href="mailto:onelastclick.olc@gmail.com" class="contact">Contact Us</a>

</header>

<div class="main">

<div class="image-box">
<img id="batchImage" src="" alt="Portrait">
</div>

<div class="batch-name" id="batchName"></div>

<button class="memories-btn" onclick="openMemories()">
Explore Memories
</button>

</div>

<footer>
<div class="social-links">
<h4>
<button><a href="https://www.instagram.com/onelastclick.olc/">Instagram</a></button>
<button><a href="https://wa.me/9502342449">Whatsapp</a></button>
<button><a href="tel:+919502342449">Call us</a></button>
</h4>
</div>
</footer>

<script>

let driveLink="";
let batchPassword="";

const params=new URLSearchParams(window.location.search);
const batchCode=params.get("code");

if(batchCode){

fetch("batches.json")

.then(response=>response.json())

.then(data=>{

if(data[batchCode]){

document.getElementById("batchImage").src=data[batchCode].image;
document.getElementById("batchName").innerText=data[batchCode].name;

driveLink=data[batchCode].drive;
batchPassword=data[batchCode].password;

}
else{

document.getElementById("batchName").innerText="Invalid Code";

}

});

}
else{

document.getElementById("batchName").innerText="Batch Code Missing";

}

/* PASSWORD CHECK */

function unlock(){

const entered=document.getElementById("batchPassword").value.trim();

if(entered===batchPassword){

document.getElementById("passwordGate").style.display="none";

}
else{

alert("Incorrect Password");

}

}
function togglePassword(){

const input=document.getElementById("batchPassword");

if(input.type==="password"){
input.type="text";
}else{
input.type="password";
}

}
/* OPEN DRIVE */

function openMemories(){

if(driveLink){

window.open(driveLink,"_blank");

}

}

</script>

</body>
</html>
