<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Click - Memories Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 25px 50px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 35px 70px rgba(0, 0, 0, 0.4);
            --shadow-glass: 0 20px 40px rgba(0, 0, 0, 0.2);
            --text-primary: #F8F9FA;
            --text-secondary: rgba(248, 249, 250, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04) 0%, transparent 50%);
            background-repeat: no-repeat;
            background-size: 400px 400px, 300px 300px, 200px 200px;
            animation: floatBG 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes floatBG {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Premium Password Gate */
        #passwordGate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .password-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-glass);
            max-width: 420px;
            width: 90%;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(50px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .password-box h2 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            margin-bottom: 1.5rem;
        }

        .password-wrapper input {
            flex: 1;
            padding: 1.25rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
        }

        .password-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .password-wrapper input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .eye-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            color: var(--text-primary);
        }

        .eye-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .unlock-btn {
            width: 100%;
            padding: 1.25rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
        }

        .unlock-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .unlock-btn:hover::before {
            left: 100%;
        }

        .unlock-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        /* Premium Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .brand-wrapper:hover {
            transform: translateY(-2px);
        }

       .brand-logo{
height:38px;
width:auto;
object-fit:contain;
}
.brand-wrapper{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
color:var(--text-primary);
}
        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact {
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            border: 1.5px solid var(--glass-border);
            padding: 0.75rem 1.75rem;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(10px);
        }

        .contact:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            box-shadow: var(--shadow-soft);
        }

        /* Premium Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .image-box {
            width: 95%;
            max-width: 800px;
            overflow: hidden;
            border-radius: 28px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-bottom: 2rem;
        }

        .image-box:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .image-box img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .image-box:hover img {
            transform: scale(1.05);
        }

        .batch-name {
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .memories-btn {
            padding: 1.25rem 4rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
        }

        .memories-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .memories-btn:hover::before {
            left: 100%;
        }

        .memories-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* Premium Footer with Social Icons */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .footer-content {
            max-width: 500px;
            margin: 0 auto;
        }

        .footer-brand {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            color: var(--text-primary);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
        }

        .social-btn:hover {
            transform: translateY(-6px) scale(1.1);
            box-shadow: var(--shadow-hover);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 1.25rem 1.5rem;
            }
            
            .main {
                padding: 2rem 1rem;
            }
            
            .password-box {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            .image-box {
                max-width: 100%;
            }
            
            .image-box img {
                height: 350px;
            }
            
            .social-links {
                gap: 1rem;
            }
            
            .social-btn {
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>

<body>
    <!-- Premium Password Gate -->
    <div id="passwordGate">
        <div class="password-box">
            <h2>🔐 Enter Batch Details</h2>

<div class="password-wrapper">
<input type="text" id="batchCodeInput" placeholder="Batch Code">
</div>

<div class="password-wrapper">
<input type="password" id="batchPassword" placeholder="Batch Password">

<span class="eye-icon" onclick="togglePassword()">
👁
</span>
</div>

<button class="unlock-btn" onclick="unlock()">Enter Memories</button>
        </div>
    </div>

    <!-- Premium Header -->
    <header>
        <a href="#" class="brand-wrapper">
           <div class="brand-logo">
<img src="images/logo.png" alt="One Last Click Logo">
</div>
            <div class="brand-name">One Last Click</div>
        </a>
        <a href="mailto:onelastclick.olc@gmail.com" class="contact">Contact Us</a>
    </header>

    <!-- Premium Main Content -->
    <div class="main">
        <div class="image-box">
            <img id="batchImage" src="" alt="Batch Portrait">
        </div>
        <div class="batch-name" id="batchName">Loading...</div>
        <button class="memories-btn" onclick="openMemories()" id="memoriesBtn">
            Explore Memories
        </button>
    </div>

    <!-- Premium Footer with Clean Social Icons -->
    <footer>
        <div class="footer-content">
            <div class="footer-brand">Memories preserved forever by <strong>One Last Click</strong></div>
            <div class="social-links">
                <a href="https://www.instagram.com/onelastclick.olc/" class="social-btn" target="_blank" title="Instagram">
                    📷
                </a>
                <a href="https://wa.me/9502342449" class="social-btn" target="_blank" title="WhatsApp">
                    💬
                </a>
                <a href="tel:+919502342449" class="social-btn" target="_blank" title="Call">
                    📞
                </a>
            </div>
        </div>
    </footer>

    <script>
        let driveLink = "";
let batchPassword = "";
let batchData = null;

const params = new URLSearchParams(window.location.search);
const urlBatchCode = params.get("code");

// Auto fill batch code if present
if(urlBatchCode){
document.getElementById("batchCodeInput").value = urlBatchCode;
loadBatch(urlBatchCode);
}

// Load batch data
function loadBatch(code){

fetch("batches.json")
.then(response => response.json())
.then(data => {

if(data[code]){

batchData = data[code];

document.getElementById("batchImage").src = batchData.image;
document.getElementById("batchName").innerText = batchData.name;

driveLink = batchData.drive;
batchPassword = batchData.password;

}else{

document.getElementById("batchName").innerText = "❌ Invalid Batch Code";
document.getElementById("memoriesBtn").style.display = "none";

}

})
.catch(() => {
document.getElementById("batchName").innerText = "⚠️ Loading Error";
});

}

// Unlock function
function unlock(){

const code = document.getElementById("batchCodeInput").value.trim();
const entered = document.getElementById("batchPassword").value.trim();
const btn = document.querySelector(".unlock-btn");

if(!batchData){
loadBatch(code);
setTimeout(()=>unlock(),400);
return;
}

if(entered === batchPassword){

btn.innerHTML = '<div class="loading"></div>Unlocking...';

setTimeout(()=>{
document.getElementById("passwordGate").style.display="none";
},800);

}else{

document.getElementById("batchPassword").classList.add("error-shake");

setTimeout(()=>{
document.getElementById("batchPassword").classList.remove("error-shake");
},500);

}

}

// Toggle password
function togglePassword(){

const input = document.getElementById("batchPassword");

if(input.type === "password"){
input.type="text";
}else{
input.type="password";
}

}

// Open memories
function openMemories(){

if(driveLink){

const btn=document.getElementById("memoriesBtn");

btn.innerHTML='<div class="loading"></div>Loading...';

setTimeout(()=>{
window.open(driveLink,"_blank");
},500);

}

}

// Enter key support
document.addEventListener('keydown',function(e){

if(e.key==="Enter" && document.getElementById("passwordGate").style.display!=="none"){
unlock();
}

});
    </script>
</body>
</html>
